name: Build and Deploy Pages

on:
  push:
    branches:
      - '**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clone wiki and copy docs into site public
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki || true
          mkdir -p site/public/docs
          if [ -d "wiki" ]; then
            find wiki -maxdepth 1 \( -iname '*.md' -o -iname '*.markdown' \) ! -iname 'Home.*' -exec cp {} site/public/docs/ \;
          fi
          cp -R docs/. site/public/docs || true
          echo "site/public/docs content:"
          ls -1 site/public/docs || true
          echo "wiki content:"
          ls -1 wiki || true
          node .gitlab/scripts/generate-wiki-pages.js wiki

      - name: Install and build site
        run: |
          cd site
          npm ci
          VITE_BASE_PATH=${{ github.ref_name }} npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
